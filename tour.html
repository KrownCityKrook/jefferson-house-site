<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Tour — Jefferson House</title>
  <meta name="description" content="Explore Jefferson House in 3D — restaurant and retail spaces in Peoria's Arts District.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='8' y='8' width='16' height='16' rx='2' fill='%23b87333' transform='rotate(45 16 16)'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #000;
      --navy: #1c273f;
      --navy-light: #253555;
      --sand: #e0d6ca;
      --cream: #f5f0ea;
      --copper: #b87333;
      --sage: #6b7f5e;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--black);
      color: var(--sand);
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: rgba(184,115,51,0.3); color: var(--cream); }

    /* Loading Screen */
    #loading {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--navy);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    #loading.done { opacity: 0; pointer-events: none; }
    #loading img {
      height: 80px; margin-bottom: 32px;
      filter: invert(1); opacity: 0.9;
    }
    #loading-text {
      font-size: 13px; color: var(--sand);
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 24px; opacity: 0.7;
    }
    #loading-bar-track {
      width: 200px; height: 2px;
      background: rgba(224,214,202,0.15);
      border-radius: 1px; overflow: hidden;
    }
    #loading-bar {
      width: 0%; height: 100%;
      background: var(--copper);
      border-radius: 1px;
      transition: width 0.2s ease;
    }

    /* Canvas */
    #canvas-container {
      position: fixed; inset: 0; z-index: 1;
    }
    #canvas-container canvas {
      display: block; width: 100%; height: 100%;
    }

    /* WebGL Fallback */
    #no-webgl {
      display: none; position: fixed; inset: 0; z-index: 2000;
      background: var(--navy);
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 32px;
    }
    #no-webgl h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px; color: var(--cream); margin-bottom: 12px;
    }
    #no-webgl p { color: var(--sand); opacity: 0.7; max-width: 400px; }

    /* Top Nav Bar */
    #tour-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      background: rgba(28,39,63,0.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(184,115,51,0.15);
      padding: 12px clamp(16px, 3vw, 32px);
      display: flex; align-items: center; justify-content: space-between;
      opacity: 0; transition: opacity 0.5s ease;
    }
    #tour-nav.visible { opacity: 1; }
    .nav-brand {
      font-family: 'Playfair Display', serif;
      font-size: 15px; font-weight: 700;
      color: var(--sand); letter-spacing: 0.5px;
    }
    .mode-toggle {
      display: flex; gap: 4px;
      background: rgba(0,0,0,0.3); border-radius: 4px; padding: 3px;
    }
    .mode-btn {
      padding: 6px 16px; border: none; border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--sand); opacity: 0.5;
      background: transparent; cursor: pointer;
      transition: all 0.3s ease;
    }
    .mode-btn.active {
      background: var(--copper); color: var(--cream);
      opacity: 1;
    }

    /* Tour Controls */
    #tour-controls {
      position: fixed; bottom: 32px; left: 50%; z-index: 50;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 20px;
      opacity: 0; transition: opacity 0.5s ease;
    }
    #tour-controls.visible { opacity: 1; }
    .tour-arrow {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid rgba(184,115,51,0.4);
      background: rgba(28,39,63,0.8);
      backdrop-filter: blur(8px);
      color: var(--copper); font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.3s ease;
    }
    .tour-arrow:hover {
      background: var(--copper); color: var(--cream);
      border-color: var(--copper);
    }
    .tour-dots { display: flex; gap: 8px; }
    .tour-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--copper); opacity: 0.3;
      cursor: pointer; transition: all 0.3s ease;
      border: none;
    }
    .tour-dot.active { opacity: 1; transform: scale(1.3); }
    .tour-dot:hover { opacity: 0.7; }

    /* Stop Label */
    #stop-label {
      position: fixed; bottom: 80px; left: 50%; z-index: 50;
      transform: translateX(-50%);
      font-family: 'Playfair Display', serif;
      font-size: 20px; color: var(--cream);
      text-align: center; white-space: nowrap;
      opacity: 0; transition: opacity 0.4s ease;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }
    #stop-label.visible { opacity: 1; }
    #stop-label .stop-sub {
      display: block; font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--copper);
      letter-spacing: 1.5px; margin-top: 4px;
      text-transform: uppercase;
    }

    /* Info Panel */
    #info-panel {
      position: fixed; top: 60px; right: 0; bottom: 0;
      width: 340px; z-index: 40;
      background: rgba(28,39,63,0.95);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid rgba(184,115,51,0.15);
      padding: 28px 24px;
      transform: translateX(100%);
      transition: transform 0.4s var(--ease);
      overflow-y: auto;
    }
    #info-panel.open { transform: translateX(0); }
    .panel-close {
      position: absolute; top: 16px; right: 16px;
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid rgba(184,115,51,0.3);
      background: transparent; color: var(--sand);
      font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s ease;
    }
    .panel-close:hover { background: var(--copper); color: var(--cream); }
    .panel-type {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--copper);
      letter-spacing: 1.5px; text-transform: uppercase;
      margin-bottom: 8px;
    }
    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px; color: var(--cream);
      margin-bottom: 16px;
    }
    .panel-status {
      display: inline-block;
      padding: 4px 12px; border-radius: 3px;
      font-size: 10px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 20px;
    }
    .panel-status.available { background: var(--sage); color: var(--cream); }
    .panel-status.negotiation { background: var(--copper); color: var(--cream); }
    .panel-status.leased { background: rgba(224,214,202,0.15); color: var(--sand); }
    .panel-gallery {
      display: flex; gap: 8px; overflow-x: auto;
      padding-bottom: 8px; margin-top: 16px;
    }
    .panel-gallery img {
      width: 120px; height: 80px; object-fit: cover;
      border-radius: 4px; border: 1px solid rgba(184,115,51,0.15);
      flex-shrink: 0; cursor: pointer;
      transition: border-color 0.3s;
    }
    .panel-gallery img:hover { border-color: var(--copper); }
    .panel-cta {
      display: block; width: 100%; margin-top: 24px;
      padding: 12px 24px; border: 1px solid rgba(184,115,51,0.4);
      background: transparent; color: var(--copper);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      text-align: center; border-radius: 3px;
      cursor: pointer; transition: all 0.3s ease;
      text-decoration: none;
    }
    .panel-cta:hover {
      background: var(--copper); color: var(--cream);
      border-color: var(--copper);
    }
    .panel-note {
      font-size: 12px; color: var(--sand); opacity: 0.65;
      font-style: italic; margin-top: 12px; line-height: 1.5;
      padding: 10px 12px; background: rgba(0,0,0,0.15);
      border-radius: 4px; border-left: 2px solid var(--copper);
    }

    /* Hotspot Markers (Explore Mode) */
    .hotspot {
      position: absolute; width: 24px; height: 24px;
      transform: translate(-50%, -50%);
      cursor: pointer; pointer-events: auto; z-index: 30;
    }
    .hotspot-ring {
      width: 100%; height: 100%;
      border: 2px solid var(--copper);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    .hotspot-dot {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 8px; height: 8px;
      background: var(--copper); border-radius: 50%;
    }
    #hotspot-layer {
      position: fixed; inset: 0; z-index: 30;
      pointer-events: none;
      display: none;
    }
    #hotspot-layer.active { display: block; }

    /* Mobile */
    @media (max-width: 768px) {
      #info-panel {
        top: auto; right: 0; bottom: 0; left: 0;
        width: 100%; height: auto; max-height: 60vh;
        transform: translateY(100%);
        border-left: none;
        border-top: 1px solid rgba(184,115,51,0.15);
        border-radius: 16px 16px 0 0;
        padding: 20px 20px 32px;
      }
      #info-panel.open { transform: translateY(0); }
      #info-panel::before {
        content: ''; display: block;
        width: 36px; height: 4px;
        background: rgba(224,214,202,0.2);
        border-radius: 2px; margin: 0 auto 16px;
      }
      #tour-controls { bottom: 20px; }
      #stop-label { bottom: 68px; font-size: 17px; }
      .tour-arrow { width: 36px; height: 36px; font-size: 16px; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    }

    /* Controls Guide */
    #controls-guide {
      position: fixed; bottom: 80px; right: 20px; z-index: 55;
      background: rgba(28,39,63,0.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(184,115,51,0.2);
      border-radius: 8px; padding: 16px 20px;
      font-size: 12px; color: var(--sand);
      opacity: 0; transition: opacity 0.5s ease;
      pointer-events: none; max-width: 220px;
    }
    #controls-guide.visible { opacity: 1; pointer-events: auto; }
    .guide-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--copper); margin-bottom: 10px;
    }
    .guide-row {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 6px;
    }
    .guide-row:last-child { margin-bottom: 0; }
    .guide-key {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--cream);
      background: rgba(255,255,255,0.08);
      padding: 2px 6px; border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .guide-action { color: var(--sand); opacity: 0.7; font-size: 11px; }
    .guide-dismiss {
      display: block; margin-top: 10px; padding-top: 8px;
      border-top: 1px solid rgba(184,115,51,0.15);
      font-size: 10px; color: var(--copper); opacity: 0.6;
      text-align: center; cursor: pointer;
    }
    .guide-dismiss:hover { opacity: 1; }
    @media (max-width: 768px) {
      #controls-guide {
        bottom: 70px; right: 10px; left: 10px;
        max-width: none;
      }
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading">
    <img src="img/logo-script.png" alt="Jefferson House">
    <div id="loading-text">Loading Virtual Tour...</div>
    <div id="loading-bar-track"><div id="loading-bar"></div></div>
  </div>

  <!-- WebGL Fallback -->
  <div id="no-webgl">
    <h2>3D Tour Unavailable</h2>
    <p>Your browser doesn't support WebGL, which is needed for the 3D tour. Try Chrome, Firefox, Safari, or Edge.</p>
  </div>

  <!-- 3D Canvas -->
  <div id="canvas-container"></div>

  <!-- Top Nav -->
  <nav id="tour-nav">
    <span class="nav-brand">Jefferson House</span>
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="tour">Tour</button>
      <button class="mode-btn" data-mode="explore">Explore</button>
    </div>
  </nav>

  <!-- Stop Label -->
  <div id="stop-label"></div>

  <!-- Tour Controls -->
  <div id="tour-controls">
    <button class="tour-arrow" id="prev-stop">&#8249;</button>
    <div class="tour-dots" id="tour-dots"></div>
    <button class="tour-arrow" id="next-stop">&#8250;</button>
  </div>

  <!-- Hotspot Layer (Explore Mode) -->
  <div id="hotspot-layer"></div>

  <!-- Info Panel -->
  <div id="info-panel">
    <button class="panel-close" id="panel-close">&times;</button>
    <div class="panel-type" id="panel-type"></div>
    <div class="panel-title" id="panel-title"></div>
    <div class="panel-status" id="panel-status"></div>
    <div class="panel-gallery" id="panel-gallery"></div>
    <div class="panel-note" id="panel-note" style="display:none"></div>
    <a href="/apply" class="panel-cta" id="panel-cta">Inquire About This Space</a>
  </div>

  <!-- Controls Guide -->
  <div id="controls-guide">
    <div class="guide-title" id="guide-title">Tour Controls</div>
    <div id="guide-content"></div>
    <div class="guide-dismiss" onclick="document.getElementById('controls-guide').classList.remove('visible')">Click to dismiss</div>
  </div>

  <!-- Scripts -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    // ┌──────────────────────────────────────────────┐
    // │  SUITE AVAILABILITY — Update statuses here   │
    // │                                              │
    // │  Options: 'available', 'negotiation', 'leased'│
    // └──────────────────────────────────────────────┘
    const SUITE_STATUS = {
      a1:      'available',
      a2:      'available',
      a3:      'available',
      'b-block': 'available',
      r440:    'available',
      r192:    'available',
    };

    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ── WebGL Check ──
    const testCanvas = document.createElement('canvas');
    const gl = testCanvas.getContext('webgl2') || testCanvas.getContext('webgl');
    if (!gl) {
      document.getElementById('no-webgl').style.display = 'flex';
      document.getElementById('loading').style.display = 'none';
      throw new Error('WebGL not supported');
    }

    // ── DOM refs ──
    const container = document.getElementById('canvas-container');
    const loadingEl = document.getElementById('loading');
    const loadingBar = document.getElementById('loading-bar');
    const tourNav = document.getElementById('tour-nav');
    const tourControls = document.getElementById('tour-controls');
    const stopLabel = document.getElementById('stop-label');
    const infoPanel = document.getElementById('info-panel');
    const hotspotLayer = document.getElementById('hotspot-layer');
    const controlsGuide = document.getElementById('controls-guide');
    const guideTitle = document.getElementById('guide-title');
    const guideContent = document.getElementById('guide-content');

    // ── Scene ──
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(50, 30, 50);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    // ── Lighting ──
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(50, 80, 50);
    scene.add(dirLight);
    const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
    fillLight.position.set(-30, 20, -30);
    scene.add(fillLight);

    // ── Controls ──
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 5;
    controls.maxDistance = 500;
    controls.maxPolarAngle = Math.PI / 2.05;
    controls.enabled = false;

    // ══════════════════════════════════════════════
    // ── Simple Camera Animation (no TWEEN dependency) ──
    // ══════════════════════════════════════════════
    let cameraAnim = null;

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function lerpVec(a, b, t) {
      return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t, z: a.z + (b.z - a.z) * t };
    }

    function animateCamera(targetPos, targetLookAt, duration = 1500, onComplete) {
      controls.enabled = false;
      const startPos = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
      const startTarget = { x: controls.target.x, y: controls.target.y, z: controls.target.z };
      const startTime = performance.now();

      cameraAnim = { startPos, startTarget, targetPos, targetLookAt, startTime, duration, onComplete };
    }

    function updateCameraAnim() {
      if (!cameraAnim) return;
      const elapsed = performance.now() - cameraAnim.startTime;
      const raw = Math.min(elapsed / cameraAnim.duration, 1);
      const t = easeInOutCubic(raw);

      const pos = lerpVec(cameraAnim.startPos, cameraAnim.targetPos, t);
      const look = lerpVec(cameraAnim.startTarget, cameraAnim.targetLookAt, t);

      camera.position.set(pos.x, pos.y, pos.z);
      controls.target.set(look.x, look.y, look.z);

      if (raw >= 1) {
        const cb = cameraAnim.onComplete;
        cameraAnim = null;
        if (cb) cb();
        if (!isTourMode) controls.enabled = true;
      }
    }

    // ══════════════════════════════════════════════
    // ── Tour Stop Data (calibrated positions) ──
    // ══════════════════════════════════════════════
    const TOUR_STOPS = [
      {
        id: 'exterior', label: 'Exterior View', sub: 'Full Building',
        camera: { x: 106.4, y: 20.5, z: 62.4 },
        lookAt: { x: -8.7, y: 0.1, z: 22.5 },
        suite: null
      },
      {
        id: 'entrance', label: 'Entrance', sub: 'Front Approach',
        camera: { x: 75.2, y: 1.6, z: 37.8 },
        lookAt: { x: -9, y: -3.9, z: 26.1 },
        suite: null
      },
      {
        id: 'a1', label: 'Suite A1', sub: 'Restaurant · 640 SF',
        camera: { x: 35.7, y: 2.4, z: 67.5 },
        lookAt: { x: 56.6, y: -3.5, z: 32.8 },
        suite: { type: 'Restaurant · 640 SF', title: 'Suite A1', status: SUITE_STATUS.a1, images: [] }
      },
      {
        id: 'a2', label: 'Suite A2', sub: 'Restaurant · 640 SF',
        camera: { x: 28.7, y: 6.1, z: 72.7 },
        lookAt: { x: 28.7, y: 5.7, z: 70.9 },
        suite: { type: 'Restaurant · 640 SF', title: 'Suite A2', status: SUITE_STATUS.a2, images: [] }
      },
      {
        id: 'a3', label: 'Suite A3', sub: 'Restaurant · 640 SF',
        camera: { x: 15.6, y: 5.9, z: 72.6 },
        lookAt: { x: 15.6, y: 5.6, z: 70.8 },
        suite: { type: 'Restaurant · 640 SF', title: 'Suite A3', status: SUITE_STATUS.a3, images: [] }
      },
      {
        id: 'b-block', label: 'B-Block Retail', sub: 'B1–B4 · 160 SF Each',
        camera: { x: 64.1, y: 1.8, z: 42.2 },
        lookAt: { x: 59.1, y: -0.3, z: 39.5 },
        suite: { type: 'Retail · 4 x 160 SF', title: 'Suites B1–B4', status: SUITE_STATUS['b-block'], images: [] }
      },
      {
        id: 'r440', label: 'Suite R440', sub: 'Retail · 440 SF',
        camera: { x: 59.9, y: 2.3, z: 26.3 },
        lookAt: { x: 35.1, y: -9.7, z: 17 },
        suite: { type: 'Retail · 440 SF', title: 'Suite R440', status: SUITE_STATUS.r440, images: [] }
      },
      {
        id: 'r192', label: 'Suite R192', sub: 'Retail · 192 SF',
        camera: { x: 42.5, y: 0, z: 32.8 },
        lookAt: { x: 40.5, y: -2.9, z: 42.2 },
        suite: { type: 'Retail · 192 SF', title: 'Suite R192', status: SUITE_STATUS.r192, images: [], note: 'Located at the corner of Restaurant A2. Not shown in this rendering.' }
      },
      {
        id: 'courtyard', label: 'Courtyard', sub: 'Peoria Arts District',
        camera: { x: 46, y: -0.4, z: 34.1 },
        lookAt: { x: 33.6, y: -1.5, z: 33.7 },
        suite: null, showCta: true
      }
    ];

    let currentStop = 0;
    let isTourMode = true;
    let autoAdvanceTimer = null;
    const AUTO_ADVANCE_MS = 8000;

    // ── Dot indicators ──
    const dotsContainer = document.getElementById('tour-dots');
    function buildDots() {
      dotsContainer.innerHTML = '';
      TOUR_STOPS.forEach((stop, i) => {
        const dot = document.createElement('button');
        dot.className = 'tour-dot' + (i === 0 ? ' active' : '');
        dot.title = stop.label;
        dot.addEventListener('click', () => goToStop(i));
        dotsContainer.appendChild(dot);
      });
    }

    // ── Navigate to stop ──
    function goToStop(index) {
      if (TOUR_STOPS.length === 0) return;
      if (index < 0 || index >= TOUR_STOPS.length) return;
      currentStop = index;
      const stop = TOUR_STOPS[index];

      animateCamera(stop.camera, stop.lookAt);
      updateDots();
      updateStopLabel(stop);

      if (stop.suite) {
        showInfoPanel(stop.suite, stop.showCta);
      } else if (stop.showCta) {
        showFinalCta();
      } else {
        hideInfoPanel();
      }

      resetAutoAdvance();
    }

    function nextStop() {
      goToStop((currentStop + 1) % TOUR_STOPS.length);
    }

    function prevStop() {
      goToStop((currentStop - 1 + TOUR_STOPS.length) % TOUR_STOPS.length);
    }

    function updateDots() {
      dotsContainer.querySelectorAll('.tour-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === currentStop);
      });
    }

    function updateStopLabel(stop) {
      stopLabel.innerHTML = stop.label +
        (stop.sub ? '<span class="stop-sub">' + stop.sub + '</span>' : '');
      stopLabel.classList.add('visible');
    }

    // ── Info Panel ──
    const panelType = document.getElementById('panel-type');
    const panelTitle = document.getElementById('panel-title');
    const panelStatus = document.getElementById('panel-status');
    const panelGallery = document.getElementById('panel-gallery');
    const panelCta = document.getElementById('panel-cta');
    const panelNote = document.getElementById('panel-note');

    function showInfoPanel(suite, showCtaButton) {
      panelType.textContent = suite.type;
      panelTitle.textContent = suite.title;
      panelStatus.textContent = suite.status === 'available' ? 'Available'
        : suite.status === 'negotiation' ? 'Under Negotiation' : 'Leased';
      panelStatus.className = 'panel-status ' + suite.status;
      panelStatus.style.display = '';
      panelGallery.innerHTML = '';
      if (suite.images && suite.images.length > 0) {
        suite.images.forEach(src => {
          const img = document.createElement('img');
          img.src = src; img.alt = suite.title;
          panelGallery.appendChild(img);
        });
      }
      if (suite.note) {
        panelNote.textContent = suite.note;
        panelNote.style.display = '';
      } else {
        panelNote.style.display = 'none';
      }
      panelCta.textContent = 'Inquire About This Space';
      panelCta.href = 'https://lastround.app/apply';
      panelCta.style.display = showCtaButton === false ? 'none' : '';
      infoPanel.classList.add('open');
    }

    function showFinalCta() {
      panelType.textContent = 'Peoria Arts District';
      panelTitle.textContent = 'Ready to Join Jefferson House?';
      panelStatus.style.display = 'none';
      panelGallery.innerHTML = '';
      panelCta.textContent = 'Apply Now';
      panelCta.href = 'https://lastround.app/apply';
      panelCta.style.display = '';
      infoPanel.classList.add('open');
    }

    function hideInfoPanel() {
      infoPanel.classList.remove('open');
    }

    // ── Auto-advance ──
    function resetAutoAdvance() {
      clearTimeout(autoAdvanceTimer);
      if (isTourMode) {
        autoAdvanceTimer = setTimeout(nextStop, AUTO_ADVANCE_MS);
      }
    }

    // ── Controls Guide ──
    const TOUR_GUIDE = `
      <div class="guide-row"><span class="guide-key">&larr; &rarr;</span><span class="guide-action">Previous / Next</span></div>
      <div class="guide-row"><span class="guide-key">Space</span><span class="guide-action">Next stop</span></div>
      <div class="guide-row"><span class="guide-key">Esc</span><span class="guide-action">Close panel</span></div>
    `;
    const EXPLORE_GUIDE = `
      <div class="guide-row"><span class="guide-key">Click + Drag</span><span class="guide-action">Orbit</span></div>
      <div class="guide-row"><span class="guide-key">Right-Click + Drag</span><span class="guide-action">Pan</span></div>
      <div class="guide-row"><span class="guide-key">Scroll</span><span class="guide-action">Zoom</span></div>
      <div class="guide-row"><span class="guide-key">Esc</span><span class="guide-action">Close panel</span></div>
    `;

    function showGuide(mode) {
      guideTitle.textContent = mode === 'tour' ? 'Tour Controls' : 'Explore Controls';
      guideContent.innerHTML = mode === 'tour' ? TOUR_GUIDE : EXPLORE_GUIDE;
      controlsGuide.classList.add('visible');
      clearTimeout(showGuide._timer);
      showGuide._timer = setTimeout(() => controlsGuide.classList.remove('visible'), 6000);
    }

    // ── Mode toggle ──
    const modeBtns = document.querySelectorAll('.mode-btn');
    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.dataset.mode;
        modeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (mode === 'tour') {
          isTourMode = true;
          controls.enabled = false;
          tourControls.style.display = 'flex';
          stopLabel.style.display = '';
          hotspotLayer.classList.remove('active');
          goToStop(currentStop);
          showGuide('tour');
        } else {
          isTourMode = false;
          controls.enabled = true;
          clearTimeout(autoAdvanceTimer);
          tourControls.style.display = 'none';
          stopLabel.classList.remove('visible');
          hideInfoPanel();
          hotspotLayer.classList.remove('active');
          showGuide('explore');
        }
      });
    });

    // ── Init ──
    function initTour() {
      goToStop(0);
      showGuide('tour');
    }

    // ── Nav button events ──
    document.getElementById('prev-stop').addEventListener('click', prevStop);
    document.getElementById('next-stop').addEventListener('click', nextStop);
    document.getElementById('panel-close').addEventListener('click', hideInfoPanel);

    // ── Keyboard nav ──
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStop(); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); prevStop(); }
      if (e.key === 'Escape') hideInfoPanel();
    });

    // ── Touch swipe ──
    let touchStartX = 0;
    renderer.domElement.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    renderer.domElement.addEventListener('touchend', (e) => {
      if (!isTourMode) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) {
        dx > 0 ? prevStop() : nextStop();
      }
    }, { passive: true });

    // ══════════════════════════════════════════════
    // ── Load Model ──
    // ══════════════════════════════════════════════
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/libs/draco/');

    const gltfLoader = new GLTFLoader();
    gltfLoader.setDRACOLoader(dracoLoader);

    gltfLoader.load(
      'jefferson-house-tour.glb',
      (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);

        model.position.sub(center);
        controls.target.set(0, 0, 0);

        const dist = maxDim * 1.5;
        camera.position.set(dist, dist * 0.6, dist);
        camera.lookAt(0, 0, 0);
        controls.update();

        buildDots();

        loadingEl.classList.add('done');
        setTimeout(() => { loadingEl.style.display = 'none'; }, 800);
        tourNav.classList.add('visible');
        tourControls.classList.add('visible');

        initTour();
      },
      (progress) => {
        if (progress.total > 0) {
          loadingBar.style.width = ((progress.loaded / progress.total) * 100) + '%';
        }
      },
      (error) => {
        console.error('Error loading model:', error);
        document.getElementById('loading-text').textContent = 'Error loading model';
        loadingBar.style.background = '#c44';
      }
    );

    // ── Resize ──
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Expose for console tuning ──
    window.camera = camera;
    window.controls = controls;
    window.getView = () => JSON.stringify({
      camera: { x: +camera.position.x.toFixed(1), y: +camera.position.y.toFixed(1), z: +camera.position.z.toFixed(1) },
      lookAt: { x: +controls.target.x.toFixed(1), y: +controls.target.y.toFixed(1), z: +controls.target.z.toFixed(1) }
    }, null, 2);

    // ── Render Loop ──
    renderer.setAnimationLoop(() => {
      controls.update();
      updateCameraAnim();
      renderer.render(scene, camera);
    });
  </script>
</body>
</html>
