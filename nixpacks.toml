# Pull Git LFS files (the 3D tour .glb) during the Railway build.
# Without this, Railway clones the repo but only gets the LFS pointer text,
# and /jefferson-house-tour.glb on the live site is 133 bytes instead of 40 MB.

[phases.setup]
nixPkgs = ["...", "git-lfs"]

[phases.install]
cmds = [
  "git lfs install --local",
  "git lfs pull",
  "npm ci"
]
