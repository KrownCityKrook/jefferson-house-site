[build]
  publish = "."
  command = ""

[build.environment]
  GIT_LFS_ENABLED = "true"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.glb"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[redirects]]
  from = "/book"
  to = "/book/index.html"
  status = 200

[[redirects]]
  from = "/events"
  to = "/events/index.html"
  status = 200

[[redirects]]
  from = "/jobs"
  to = "/jobs/index.html"
  status = 200

# Proxy the tenant application from lastround.app so the URL stays on jeffersonhouseaz.com
[[redirects]]
  from = "/apply"
  to = "https://lastround.app/apply"
  status = 200
  force = true

[[redirects]]
  from = "/apply/*"
  to = "https://lastround.app/apply/:splat"
  status = 200
  force = true

# Proxy assets and API calls the apply page depends on
[[redirects]]
  from = "/api/*"
  to = "https://lastround.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/lease-editor/*"
  to = "https://lastround.app/lease-editor/:splat"
  status = 200
  force = true

# Apply page links to /jefferson-house/book/ on lastround, send that to our /book/
[[redirects]]
  from = "/jefferson-house/book"
  to = "/book/"
  status = 301

[[redirects]]
  from = "/jefferson-house/book/*"
  to = "/book/"
  status = 301
